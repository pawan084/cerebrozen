name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: FastAPI + Postgres (pytest) ──────────────────────────────
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cerebro
          POSTGRES_PASSWORD: cerebro
          POSTGRES_DB: cerebro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cerebro"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt
      - name: Run pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://cerebro:cerebro@localhost:5432/cerebro
          SECRET_KEY: ci-secret
          # Voice/AI tests stub the external calls, so these stay unset here and
          # the suite is fully hermetic. Provided for parity with the runtime.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        # Enforce a coverage floor so the suite can't silently regress. The
        # hermetic run sits at ~97%; the gate is set below that with headroom.
        # (prestart/seed + the LangGraph LLM agent are excluded via .coveragerc.)
        run: pytest -q --cov=app --cov-report=term-missing --cov-fail-under=95

  # ── Web + Admin: Playwright e2e (isolated docker stack) ───────────────
  e2e:
    name: Web + Admin (Playwright e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Provision API env
        # Blank secrets => voice loop is simply disabled (stack still passes).
        # Set OPENAI/DEEPGRAM/ELEVENLABS repo secrets to exercise it live.
        run: |
          cp backend/.env.example backend/.env
          {
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            echo "DEEPGRAM_API_KEY=${{ secrets.DEEPGRAM_API_KEY }}"
            echo "ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}"
          } >> backend/.env
      - name: Run e2e stack
        run: >-
          docker compose -f docker-compose.e2e.yml up --build
          --abort-on-container-exit --exit-code-from e2e
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  # ── iOS: SwiftUI UITests (Simulator) ──────────────────────────────────
  # The two live-backend tests (testCloudSync / testCloudChatAndPlan) self-skip
  # here because no API is running on the macOS runner; the other 8 run fully.
  ios:
    name: iOS (XCUITests)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Run UITests
        working-directory: apps/ios
        run: |
          set -o pipefail
          # Pick a concrete, available iPhone simulator on the runner.
          DEVICE=$(xcrun simctl list devices available \
            | grep -Eo 'iPhone 1[0-9]( Pro)?' | sort -r | head -1)
          echo "Using simulator: $DEVICE"
          xcodebuild test \
            -project CereBro.xcodeproj \
            -scheme CereBro \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            -resultBundlePath TestResults.xcresult
      - name: Upload results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: apps/ios/TestResults.xcresult
          if-no-files-found: ignore

  # ── Android: Kotlin + Compose scaffold (Gradle build) ─────────────────
  # continue-on-error while the module is a scaffold: a version bump shouldn't
  # turn the whole pipeline red. Flip to blocking once it's built once green.
  android:
    name: Android (build)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: Assemble debug
        working-directory: apps/android
        run: gradle :app:assembleDebug --no-daemon --stacktrace
