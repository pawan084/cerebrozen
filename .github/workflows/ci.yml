# CI — the mechanical gates from docs/ENGINEERING.md.
# Every job runs hermetically: no API keys, no external accounts. The engine
# job gets a pgvector container (its RAG integration tests skip without one,
# which would drop coverage below the gate).

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  engine:
    name: engine (pytest, 96% branch gate)
    runs-on: ubuntu-latest
    services:
      pgvector:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: pg
          POSTGRES_DB: cerebrozen
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    defaults: { run: { working-directory: services/engine } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip, cache-dependency-path: services/engine/requirements.txt }
      - run: pip install -r requirements.txt
      - run: python -m pytest --cov -q

  platform:
    name: platform (pytest, 95% gate)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: services/platform } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip, cache-dependency-path: services/platform/requirements.txt }
      - run: pip install -r requirements.txt
      - run: python -m pytest --cov -q

  web:
    name: marketing site (build + lint)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: apps/web/package-lock.json }
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  admin:
    name: admin (build)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/admin } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: apps/admin/package-lock.json }
      - run: npm ci
      - run: npm run build

  android:
    name: android (tests + 95% JaCoCo gate + lint)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/android } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :app:assembleDebug :app:check --no-daemon

  app:
    name: employee app (build)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/app } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: apps/app/package-lock.json }
      - run: npm ci
      - run: npm run build

  e2e:
    name: e2e (composed stack)
    runs-on: ubuntu-latest
    # The gate ENGINEERING.md's cross-stack protocol names: "SSE vocabulary and JWT claims
    # changes additionally require an e2e run against the composed stack before merge".
    # It runs the real stack — five services, one Postgres, zero API keys (mock LLM).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: e2e/package-lock.json }
      - run: npm ci
        working-directory: e2e
      - run: npx playwright install --with-deps chromium
        working-directory: e2e
      - name: bring up the composed stack
        # --wait blocks on the healthchecks, so a spec never races a cold container.
        run: docker compose up --build -d --wait
      - run: npm test
        working-directory: e2e
      - name: stack logs (on failure)
        if: failure()
        run: docker compose logs --tail=200
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-report
          path: e2e/playwright-report/
          retention-days: 7
      - name: tear down
        if: always()
        run: docker compose down -v --remove-orphans

  hygiene:
    name: tokens drift + secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 } # gitleaks scans history
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: design-token drift check
        run: node scripts/sync-tokens.mjs --check
      - name: marketing claims check (rule 6 / CLAIMS_MAP.md)
        run: node scripts/check-claims.mjs
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Named explicitly rather than relying on auto-discovery: the config is what
          # allowlists this repo's 7 known false positives (see .gitleaks.toml), and if the
          # action silently missed it the job would fail on findings that are fine. The
          # inverse — a config that quietly disables the default rules — is the dangerous
          # one, so `.gitleaks.toml` sets `[extend] useDefault = true` and every allowlist
          # entry is a literal value, never a path.
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
