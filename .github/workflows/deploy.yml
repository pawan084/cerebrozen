name: Deploy (prod)

# Zero-touch production deploy to the Contabo VPS. Manual-dispatch by default so
# a release goes out only when you choose. Requires the repo to be cloned once on
# the server and backend/.env.production filled in (see docs/RELEASE_PLAN.md).
#
# Repo secrets required:
#   DEPLOY_HOST     e.g. 194.163.182.1  (or api.cerebrozen.in)
#   DEPLOY_USER     e.g. deploy
#   DEPLOY_SSH_KEY  a private key whose public half is in the server's authorized_keys
# Optional repo variable:
#   DEPLOY_PATH     path to the checkout on the server (default: ~/cerebrozen)
on:
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Pull, rebuild, health-check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ${{ vars.DEPLOY_PATH || '~/cerebrozen' }}
            git fetch --all --prune
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml --env-file backend/.env.production up -d --build
            docker image prune -f

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            if curl -fsS https://api.cerebrozen.in/health | grep -q '"status":"ok"'; then
              echo "API healthy ✓"; exit 0
            fi
            echo "waiting for API… ($i/10)"; sleep 6
          done
          echo "API did not become healthy"; exit 1
