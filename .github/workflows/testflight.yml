name: TestFlight

# Manual only — never runs automatically. Requires the App Store Connect API key
# repo secrets (ASC_KEY_ID, ASC_ISSUER_ID, ASC_KEY_CONTENT). Without them the
# fastlane lane fails fast with a clear message instead of doing anything partial.
on:
  workflow_dispatch:
    inputs:
      changelog:
        description: "TestFlight tester notes"
        required: false
        default: "Internal build."

concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  beta:
    name: Build & upload to TestFlight
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/ios

      - name: Upload to TestFlight
        working-directory: apps/ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          APP_IDENTIFIER: ${{ vars.APP_IDENTIFIER || 'com.cerebro.app' }}
          CHANGELOG: ${{ github.event.inputs.changelog }}
        run: bundle exec fastlane ios beta
