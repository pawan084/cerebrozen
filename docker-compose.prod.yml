# Production stack. Differs from the dev compose:
#   - secrets/config come from .env.production (NOT committed)
#   - Postgres is NOT published to the host (reachable only inside the network)
#   - the API runs gunicorn with multiple uvicorn workers (WEB_CONCURRENCY)
#   - app ports bind to 127.0.0.1 only — front them with a TLS reverse proxy
#   - restart: unless-stopped, healthchecks, no demo seeding
#
#   PUBLIC_API_URL=https://api.your-domain.com \
#     docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
name: cerebro-prod

services:
  db:
    image: postgres:16-alpine
    env_file: ./backend/.env.production   # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-cerebro}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: ./backend
    env_file: ./backend/.env.production
    # gunicorn reads the worker count from WEB_CONCURRENCY (set in .env.production).
    command: >-
      sh -c "python -m app.prestart &&
      gunicorn app.main:app -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000 --access-logfile - --error-logfile -"
    depends_on:
      db:
        condition: service_healthy
    # No host port: reached only over the internal network by Caddy (api:8000).
    expose:
      - "8000"
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      args:
        # Public HTTPS URL of the API, inlined into the client bundle at build.
        NEXT_PUBLIC_API_URL: "${PUBLIC_API_URL:-https://api.cerebrozen.in}"
    expose:
      - "3000"
    depends_on:
      - api
    restart: unless-stopped

  admin:
    build:
      context: ./apps/admin
      args:
        NEXT_PUBLIC_API_URL: "${PUBLIC_API_URL:-https://api.cerebrozen.in}"
    expose:
      - "3001"
    depends_on:
      - api
    restart: unless-stopped

  app:
    build:
      context: ./apps/app
      args:
        NEXT_PUBLIC_API_URL: "${PUBLIC_API_URL:-https://api.cerebrozen.in}"
    expose:
      - "3002"
    depends_on:
      - api
    restart: unless-stopped

  # TLS-terminating reverse proxy. Auto-provisions Let's Encrypt certs for the
  # domains in deploy/Caddyfile. The only service that binds public ports.
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - admin
      - api
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
